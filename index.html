<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SENTINEL v3 — Long-Term Investment Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN SYSTEM
═══════════════════════════════════════ */
:root {
  --bg:          #F2F0E9;
  --surface:     #FFFFFF;
  --surface-2:   #F8F6F0;
  --navy:        #0C1D36;
  --navy-mid:    #1A3356;
  --gold:        #C89B2A;
  --gold-pale:   #F6EDD4;
  --buy:         #1A6835;
  --buy-bg:      #EBF5EE;
  --buy-border:  #A8D4B5;
  --watch:       #27509E;
  --watch-bg:    #EBF0FA;
  --watch-border:#9AB5E8;
  --avoid:       #B42E2E;
  --avoid-bg:    #FAE9E9;
  --avoid-border:#E8AAAA;
  --border:      #E2DDD3;
  --border-2:    #C8C3B8;
  --text-1:      #1A1714;
  --text-2:      #56524D;
  --text-3:      #9A958C;
  --shadow-xs:   0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:   0 1px 4px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 18px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.13), 0 4px 14px rgba(0,0,0,.07);
  --r:           12px;
  --r-sm:        6px;
  --mono:        'JetBrains Mono', 'Courier New', monospace;
  --body:        'DM Sans', system-ui, sans-serif;
  --display:     'Cormorant Garamond', Georgia, serif;
  --ease:        cubic-bezier(.4,0,.2,1);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: var(–body);
background: var(–bg);
color: var(–text-1);
min-height: 100vh;
font-size: 14px;
line-height: 1.5;
-webkit-font-smoothing: antialiased;
}

.hide { display: none !important; }

/* ── HEADER ─────────────────────────── */
.hdr {
background: var(–navy);
height: 60px;
display: flex;
align-items: center;
gap: 20px;
padding: 0 28px;
position: sticky;
top: 0;
z-index: 200;
box-shadow: 0 2px 24px rgba(0,0,0,.3);
}

.hdr-logo {
font-family: var(–display);
font-size: 24px;
font-weight: 600;
color: #fff;
letter-spacing: .1em;
white-space: nowrap;
}
.hdr-logo em { color: var(–gold); font-style: normal; }

.hdr-sub {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .18em;
text-transform: uppercase;
color: rgba(255,255,255,.35);
border-left: 1px solid rgba(255,255,255,.12);
padding-left: 16px;
line-height: 1.55;
white-space: nowrap;
}

.hdr-gap { flex: 1; }

.search-wrap {
position: relative;
width: 280px;
}

.search-wrap input {
width: 100%;
background: rgba(255,255,255,.09);
border: 1px solid rgba(255,255,255,.14);
border-radius: var(–r-sm);
color: #fff;
font-family: var(–mono);
font-size: 10.5px;
letter-spacing: .04em;
padding: 8px 34px 8px 13px;
outline: none;
transition: background .15s, border-color .15s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,.3); }
.search-wrap input:focus { background: rgba(255,255,255,.14); border-color: var(–gold); }

.search-icon {
position: absolute;
right: 11px;
top: 50%;
transform: translateY(-50%);
color: rgba(255,255,255,.35);
font-size: 14px;
pointer-events: none;
}

.hdr-time {
font-family: var(–mono);
font-size: 10px;
color: rgba(255,255,255,.45);
letter-spacing: .08em;
text-align: right;
line-height: 1.7;
white-space: nowrap;
}
.hdr-time strong { color: rgba(255,255,255,.75); font-size: 12px; display: block; }

/* ── DROPDOWN ───────────────────────── */
.dropdown {
position: absolute;
top: calc(100% + 8px);
left: 0;
width: 420px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–r);
box-shadow: var(–shadow-lg);
display: none;
z-index: 1000;
max-height: 400px;
overflow-y: auto;
animation: fadeDown .15s var(–ease);
}
.dropdown.open { display: block; }

@keyframes fadeDown {
from { opacity: 0; transform: translateY(-5px); }
to   { opacity: 1; transform: translateY(0); }
}

.drop-group {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text-3);
padding: 9px 14px 5px;
background: var(–surface-2);
border-top: 1px solid var(–border);
}
.drop-group:first-child { border-top: none; }

.drop-item {
display: grid;
grid-template-columns: 70px 1fr 48px 110px;
align-items: center;
gap: 8px;
padding: 9px 14px;
cursor: pointer;
transition: background .1s;
}
.drop-item:hover, .drop-item.focused { background: var(–bg); }

.di-tick { font-family: var(–mono); font-size: 11.5px; font-weight: 500; color: var(–navy); }
.di-name { font-size: 11.5px; color: var(–text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.di-exch { font-family: var(–mono); font-size: 8.5px; background: var(–navy); color: #fff; padding: 2px 5px; border-radius: 3px; text-align: center; }
.di-sect { font-size: 10px; color: var(–text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
.drop-empty { padding: 20px; font-family: var(–mono); font-size: 10.5px; color: var(–text-3); text-align: center; letter-spacing: .1em; }

/* ── API BANNER ─────────────────────── */
.api-banner {
background: var(–gold-pale);
border-bottom: 1px solid #E8CC80;
padding: 12px 28px;
display: flex;
align-items: center;
gap: 20px;
flex-wrap: wrap;
}

.api-banner-ttl {
font-family: var(–mono);
font-size: 9.5px;
font-weight: 500;
letter-spacing: .14em;
text-transform: uppercase;
color: #7A5A00;
white-space: nowrap;
}

.api-inputs { display: flex; gap: 12px; flex: 1; flex-wrap: wrap; align-items: center; }

.api-field { display: flex; align-items: center; gap: 8px; }
.api-field label {
font-family: var(–mono);
font-size: 9px;
letter-spacing: .1em;
text-transform: uppercase;
color: #7A5A00;
white-space: nowrap;
}
.api-field input {
font-family: var(–mono);
font-size: 10.5px;
padding: 6px 11px;
border: 1px solid #DCC060;
border-radius: var(–r-sm);
background: #FFFDF5;
color: var(–text-1);
width: 230px;
outline: none;
}
.api-field input:focus { border-color: var(–gold); }

.btn-save {
font-family: var(–mono);
font-size: 9.5px;
letter-spacing: .12em;
text-transform: uppercase;
background: var(–navy);
color: #fff;
border: none;
border-radius: var(–r-sm);
padding: 7px 16px;
cursor: pointer;
transition: background .15s;
white-space: nowrap;
}
.btn-save:hover { background: var(–navy-mid); }

/* ── MAIN ───────────────────────────── */
.main {
max-width: 1420px;
margin: 0 auto;
padding: 28px;
}

/* ── PORTFOLIO PANEL ────────────────── */
.port-panel {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–r);
margin-bottom: 22px;
box-shadow: var(–shadow-sm);
overflow: hidden;
}

.port-hdr {
display: flex;
align-items: center;
justify-content: space-between;
padding: 15px 20px;
cursor: pointer;
user-select: none;
transition: background .12s;
border-bottom: 1px solid transparent;
}
.port-hdr:hover { background: var(–surface-2); }
.port-hdr.open  { border-bottom-color: var(–border); }

.port-hdr-title {
font-family: var(–mono);
font-size: 9.5px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text-2);
display: flex;
align-items: center;
gap: 9px;
}
.port-hdr-title::before {
content: ‘⬡’;
color: var(–gold);
font-size: 13px;
}

.port-chev { font-size: 11px; color: var(–text-3); transition: transform .2s; }
.port-chev.open { transform: rotate(180deg); }

.port-body {
display: none;
grid-template-columns: repeat(3, 1fr);
gap: 0;
padding: 0;
}
.port-body.open { display: grid; }

.port-col {
padding: 18px 20px;
border-right: 1px solid var(–border);
}
.port-col:last-child { border-right: none; }

.port-col-title {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .22em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 13px;
}

.port-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 9px;
}
.port-lbl {
font-family: var(–mono);
font-size: 9.5px;
color: var(–text-2);
width: 75px;
flex-shrink: 0;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.port-track {
flex: 1;
height: 5px;
background: var(–border);
border-radius: 3px;
overflow: hidden;
}
.port-fill {
height: 100%;
border-radius: 3px;
transition: width .6s var(–ease);
}
.port-cnt {
font-family: var(–mono);
font-size: 9.5px;
color: var(–text-3);
width: 20px;
text-align: right;
}

/* ── STATS ──────────────────────────── */
.stats {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 12px;
margin-bottom: 18px;
}

.stat {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–r);
padding: 16px 18px;
box-shadow: var(–shadow-xs);
transition: box-shadow .15s;
}
.stat:hover { box-shadow: var(–shadow-sm); }

.stat-n {
font-family: var(–display);
font-size: 34px;
font-weight: 600;
color: var(–navy);
line-height: 1;
margin-bottom: 4px;
}
.stat-l {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .18em;
text-transform: uppercase;
color: var(–text-3);
}
.stat.buy   .stat-n { color: var(–buy); }
.stat.watch .stat-n { color: var(–watch); }
.stat.avoid .stat-n { color: var(–avoid); }

/* ── TOOLBAR ────────────────────────── */
.toolbar {
display: flex;
align-items: center;
gap: 6px;
margin-bottom: 18px;
flex-wrap: wrap;
}

.tb-label {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text-3);
margin-right: 2px;
}

.pill {
font-family: var(–mono);
font-size: 9.5px;
letter-spacing: .08em;
text-transform: uppercase;
background: var(–surface);
color: var(–text-2);
border: 1px solid var(–border);
border-radius: 20px;
padding: 6px 14px;
cursor: pointer;
transition: all .14s;
white-space: nowrap;
}
.pill:hover         { border-color: var(–navy); color: var(–navy); }
.pill.a             { background: var(–navy); color: #fff; border-color: var(–navy); }
.pill.a-buy         { background: var(–buy); color: #fff; border-color: var(–buy); }
.pill.a-watch       { background: var(–watch); color: #fff; border-color: var(–watch); }
.pill.a-avoid       { background: var(–avoid); color: #fff; border-color: var(–avoid); }

.tb-sep { width: 1px; height: 18px; background: var(–border); margin: 0 2px; }
.tb-gap { flex: 1; }

.btn-fetch-all {
font-family: var(–mono);
font-size: 9.5px;
letter-spacing: .1em;
text-transform: uppercase;
background: var(–gold);
color: #fff;
border: none;
border-radius: var(–r-sm);
padding: 8px 18px;
cursor: pointer;
transition: background .14s;
}
.btn-fetch-all:hover { background: #B08020; }

/* ── GRID ───────────────────────────── */
.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
gap: 18px;
}

/* ── CARD ───────────────────────────── */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–r);
box-shadow: var(–shadow-sm);
overflow: hidden;
position: relative;
transition: box-shadow .18s;
}
.card:hover { box-shadow: var(–shadow-md); }

.card-stripe { height: 3px; }
.card.BUY    .card-stripe { background: linear-gradient(90deg, var(–buy) 0%, #52C57A 100%); }
.card.WATCH  .card-stripe { background: linear-gradient(90deg, var(–watch) 0%, #6B9CE8 100%); }
.card.AVOID  .card-stripe { background: linear-gradient(90deg, var(–avoid) 0%, #E88888 100%); }
.card.PENDING .card-stripe { background: var(–border); }

/* card head */
.chead {
display: flex;
justify-content: space-between;
align-items: flex-start;
padding: 15px 17px 11px;
}
.cticker {
font-family: var(–mono);
font-size: 17px;
font-weight: 500;
color: var(–navy);
letter-spacing: .02em;
line-height: 1;
margin-bottom: 3px;
}
.cname   { font-size: 11.5px; color: var(–text-2); margin-bottom: 2px; }
.csector { font-family: var(–mono); font-size: 8.5px; color: var(–text-3); letter-spacing: .1em; text-transform: uppercase; }

.chead-r { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.cexch {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .1em;
background: var(–navy);
color: #fff;
padding: 3px 7px;
border-radius: 4px;
}
.csignal {
font-family: var(–mono);
font-size: 10.5px;
font-weight: 500;
letter-spacing: .14em;
padding: 4px 9px;
border-radius: 4px;
}
.csignal.BUY    { background: var(–buy-bg);   color: var(–buy);   border: 1px solid var(–buy-border); }
.csignal.WATCH  { background: var(–watch-bg);  color: var(–watch); border: 1px solid var(–watch-border); }
.csignal.AVOID  { background: var(–avoid-bg);  color: var(–avoid); border: 1px solid var(–avoid-border); }
.csignal.PENDING { background: var(–surface-2); color: var(–text-3); border: 1px solid var(–border); }

/* stale warning */
.cstale {
margin: 0 17px 10px;
padding: 7px 11px;
background: var(–gold-pale);
border: 1px solid #DCC060;
border-radius: var(–r-sm);
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .1em;
color: #7A5A00;
}

/* price row */
.cprice-row {
display: flex;
align-items: baseline;
gap: 9px;
padding: 0 17px 10px;
flex-wrap: wrap;
}
.cprice {
font-family: var(–mono);
font-size: 21px;
font-weight: 500;
color: var(–navy);
letter-spacing: -.01em;
}
.cchange {
font-family: var(–mono);
font-size: 11px;
font-weight: 500;
padding: 2px 6px;
border-radius: 4px;
}
.cchange.pos { background: #E8F5EE; color: var(–buy); }
.cchange.neg { background: #FAE8E8; color: var(–avoid); }
.cchange.neu { background: var(–surface-2); color: var(–text-3); }
.c52w {
font-family: var(–mono);
font-size: 8.5px;
color: var(–text-3);
letter-spacing: .04em;
align-self: center;
}

/* data source tag */
.cdsrc {
padding: 0 17px 11px;
}
.cdsrc span {
font-family: var(–mono);
font-size: 7.5px;
letter-spacing: .14em;
text-transform: uppercase;
color: var(–text-3);
background: var(–surface-2);
border: 1px solid var(–border);
padding: 2px 7px;
border-radius: 3px;
}
.cdsrc span.live { color: var(–buy); border-color: var(–buy-border); background: var(–buy-bg); }

/* sparkline */
.spark-wrap { margin: 0 17px 13px; }
.spark-hdr {
display: flex;
justify-content: space-between;
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 4px;
}
.spark-svg { width: 100%; height: 52px; border-radius: 4px; overflow: hidden; }
.spark-rng {
display: flex;
justify-content: space-between;
font-family: var(–mono);
font-size: 8.5px;
color: var(–text-3);
margin-top: 3px;
}

/* score */
.cscore {
display: flex;
align-items: center;
gap: 13px;
padding: 13px 17px;
background: var(–surface-2);
border-top: 1px solid var(–border);
border-bottom: 1px solid var(–border);
}
.cscore-ring { position: relative; width: 68px; height: 68px; flex-shrink: 0; }
.cscore-ring svg { width: 68px; height: 68px; transform: rotate(150deg); }
.cscore-ring-lbl {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
line-height: 1;
}
.cscore-n { font-family: var(–mono); font-size: 17px; font-weight: 500; letter-spacing: -.02em; }
.cscore-n.h { color: var(–buy); }
.cscore-n.m { color: #C87D10; }
.cscore-n.l { color: var(–avoid); }
.cscore-sub { font-family: var(–mono); font-size: 8.5px; color: var(–text-3); }

.cscore-lbl {
font-family: var(–mono);
font-size: 7.5px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 3px;
}
.cscore-verdict { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.cscore-verdict.h { color: var(–buy); }
.cscore-verdict.m { color: #C87D10; }
.cscore-verdict.l { color: var(–avoid); }
.cscore-desc { font-size: 11px; color: var(–text-2); line-height: 1.45; }

/* badges */
.cbadges { padding: 10px 17px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid var(–border); }
.cbadge {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .08em;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 4px;
border: 1px solid var(–border);
color: var(–text-2);
background: var(–surface);
}
.cbadge.wide   { border-color: var(–buy-border);   background: var(–buy-bg);   color: var(–buy); }
.cbadge.narrow { border-color: #DCC060;              background: var(–gold-pale); color: #7A5A00; }
.cbadge.none   { border-color: var(–avoid-border);  background: var(–avoid-bg);  color: var(–avoid); }
.cbadge.dca    { border-color: var(–watch-border);  background: var(–watch-bg);  color: var(–watch); }
.cbadge.hi     { border-color: var(–buy-border);   background: var(–buy-bg);   color: var(–buy); }
.cbadge.med    { border-color: #DCC060;              background: var(–gold-pale); color: #7A5A00; }
.cbadge.lo     { border-color: var(–avoid-border);  background: var(–avoid-bg);  color: var(–avoid); }

/* thesis */
.cthesis { padding: 12px 17px; border-bottom: 1px solid var(–border); }
.cthesis-lbl {
font-family: var(–mono);
font-size: 7.5px;
letter-spacing: .2em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 5px;
}
.cthesis-txt { font-size: 11.5px; color: var(–text-2); line-height: 1.55; font-style: italic; }

/* metrics */
.cmet { padding: 13px 17px; border-bottom: 1px solid var(–border); }
.cmet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.cmet-l {
font-family: var(–mono);
font-size: 7.5px;
letter-spacing: .15em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 2px;
}
.cmet-v { font-family: var(–mono); font-size: 11.5px; font-weight: 500; color: var(–text-1); }
.cmet-v.pos  { color: var(–buy); }
.cmet-v.neg  { color: var(–avoid); }
.cmet-v.warn { color: #C87D10; }

/* analyst target */
.ctarget { padding: 11px 17px; border-bottom: 1px solid var(–border); }
.ctarget-hd {
display: flex;
justify-content: space-between;
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text-3);
margin-bottom: 8px;
align-items: center;
}
.cupside     { color: var(–buy); }
.cupside.neg { color: var(–avoid); }
.ctarget-track { position: relative; height: 4px; background: var(–border); border-radius: 2px; }
.ctarget-fill  { position: absolute; height: 100%; background: var(–border-2); border-radius: 2px; left: 0; }
.ctarget-dot   { position: absolute; width: 10px; height: 10px; border-radius: 50%; top: 50%; transform: translate(-50%,-50%); }
.ctarget-dot.cur { background: var(–navy); border: 2px solid var(–surface); box-shadow: 0 0 0 1px var(–navy); }
.ctarget-dot.tgt { background: var(–gold); border: 2px solid var(–surface); box-shadow: 0 0 0 1px var(–gold); }

/* growth narratives */
.cgrowth { padding: 11px 17px; border-bottom: 1px solid var(–border); display: flex; flex-direction: column; gap: 8px; }
.cgrow-item { display: flex; gap: 9px; align-items: flex-start; }
.cgrow-tag {
font-family: var(–mono);
font-size: 7.5px;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–text-3);
padding: 2px 6px;
background: var(–surface-2);
border: 1px solid var(–border);
border-radius: 3px;
white-space: nowrap;
flex-shrink: 0;
margin-top: 1px;
}
.cgrow-txt { font-size: 11px; color: var(–text-2); line-height: 1.5; }

/* tags */
.ctags { padding: 10px 17px; border-bottom: 1px solid var(–border); display: flex; flex-wrap: wrap; gap: 6px; }
.ctag {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .06em;
padding: 3px 7px;
border-radius: 4px;
}
.ctag.cat  { background: var(–buy-bg);   color: var(–buy);   border: 1px solid var(–buy-border); }
.ctag.risk { background: var(–avoid-bg); color: var(–avoid); border: 1px solid var(–avoid-border); }

/* pending / error */
.cpending { padding: 26px 17px; text-align: center; }
.cpending-ttl { font-family: var(–mono); font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase; color: var(–text-3); margin-bottom: 4px; }
.cpending-sub { font-size: 11.5px; color: var(–text-3); }
.cerr { margin: 12px 17px; padding: 9px 11px; background: var(–avoid-bg); border: 1px solid var(–avoid-border); border-radius: var(–r-sm); font-size: 11px; color: var(–avoid); }

/* loading overlay */
.cloading {
position: absolute;
inset: 0;
background: rgba(255,255,255,.97);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 9px;
border-radius: var(–r);
z-index: 10;
}
.cload-lbl { font-family: var(–mono); font-size: 9.5px; letter-spacing: .2em; text-transform: uppercase; color: var(–text-2); }
.cload-bar { width: 120px; height: 2px; background: var(–border); border-radius: 1px; overflow: hidden; }
.cload-fill { height: 100%; background: var(–navy); border-radius: 1px; animation: bar 1.8s ease-in-out infinite; }
@keyframes bar {
0%   { width: 0; margin-left: 0; }
50%  { width: 60%; margin-left: 20%; }
100% { width: 0; margin-left: 100%; }
}
.cload-phase { font-family: var(–mono); font-size: 8.5px; color: var(–gold); letter-spacing: .1em; text-transform: uppercase; }
.cload-sub { font-family: var(–mono); font-size: 8.5px; color: var(–text-3); letter-spacing: .1em; }
.cload-cancel {
margin-top: 12px;
background: transparent;
border: 1px solid var(–border);
color: var(–text-2);
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .12em;
text-transform: uppercase;
padding: 6px 14px;
border-radius: var(–r-sm);
cursor: pointer;
transition: all .12s;
}
.cload-cancel:hover { border-color: var(–avoid); color: var(–avoid); }

/* card footer */
.cfoot {
display: flex;
align-items: center;
justify-content: space-between;
padding: 9px 17px;
background: var(–surface-2);
border-top: 1px solid var(–border);
}
.cupdated { font-family: var(–mono); font-size: 8.5px; color: var(–text-3); letter-spacing: .06em; }
.cbtns { display: flex; gap: 6px; }
.cbtn {
font-family: var(–mono);
font-size: 8.5px;
letter-spacing: .1em;
text-transform: uppercase;
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-2);
padding: 5px 11px;
border-radius: var(–r-sm);
cursor: pointer;
transition: all .12s;
}
.cbtn:hover         { border-color: var(–navy); color: var(–navy); }
.cbtn-fetch         { background: var(–navy); color: #fff; border-color: var(–navy); }
.cbtn-fetch:hover   { background: var(–navy-mid); border-color: var(–navy-mid); color: #fff; }
.cbtn-del:hover     { border-color: var(–avoid); color: var(–avoid); }

/* empty state */
.empty {
grid-column: 1/-1;
padding: 80px 20px;
text-align: center;
}
.empty-ttl { font-family: var(–display); font-size: 28px; font-weight: 300; font-style: italic; color: var(–text-3); margin-bottom: 7px; }
.empty-sub { font-size: 13px; color: var(–text-3); }

/* toast */
.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(70px);
background: var(–navy);
color: #fff;
font-family: var(–mono);
font-size: 10.5px;
letter-spacing: .08em;
padding: 11px 18px;
border-radius: var(–r-sm);
box-shadow: var(–shadow-lg);
opacity: 0;
transition: all .3s cubic-bezier(.34,1.56,.64,1);
z-index: 9999;
white-space: nowrap;
pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.err  { background: var(–avoid); }
.toast.w    { background: #7A5A00; }

/* responsive */
@media (max-width: 1000px) {
.stats       { grid-template-columns: repeat(3,1fr); }
.port-body.open { grid-template-columns: 1fr; }
.hdr-sub     { display: none; }
.search-wrap { width: 200px; }
}
@media (max-width: 650px) {
.main        { padding: 14px; }
.stats       { grid-template-columns: repeat(2,1fr); }
.grid        { grid-template-columns: 1fr; }
.hdr         { padding: 0 14px; gap: 10px; }
.hdr-time    { display: none; }
}
</style>

  if (exchange === 'ASX') return `ASX:${ticker}`;

const fmt  = (v, d=2) => (v !== null && v !== undefined && !isNaN(Number(v))) ? Number(v).toFixed(d) : 'N/A';
const fmtP = v => (v !== null && v !== undefined && !isNaN(Number(v))) ? `${(Number(v)*100).toFixed(1)}%` : 'N/A';

function fmtCap(mln) {
  if (!mln) return 'N/A';
  const n = parseFloat(mln);
  if (isNaN(n)) return mln;
  if (n >= 1e6) return `${(n/1e6).toFixed(2)}T`;
  if (n >= 1e3) return `${(n/1e3).toFixed(1)}B`;

}

async function fhGet(path) {
  const r = await fetch(`${FH_BASE}${path}&token=${fhKey}`);
  if (!r.ok) throw new Error(`Finnhub ${r.status}`);
  return r.json();
}

async function fetchMarketData(ticker, exchange) {
  const sym = fhSym(ticker, exchange);

  const [qRes, mRes] = await Promise.allSettled([
    fhGet(`/quote?symbol=${sym}`),
    fhGet(`/stock/metric?symbol=${sym}&metric=all`)
  ]);

  const toTs   = Math.floor(Date.now() / 1000);
  const fromTs = toTs - 365 * 24 * 3600;
  let cRes = null;
  try {
    cRes = await fhGet(`/stock/candle?symbol=${sym}&resolution=W&from=${fromTs}&to=${toTs}`);
  } catch(e) { /* non-fatal */ }

  const q = qRes.status === 'fulfilled' ? qRes.value : {};
  const m = (mRes.status === 'fulfilled' ? mRes.value?.metric : null) || {};

  const price     = q.c > 0 ? q.c : null;
  const change    = price && q.pc > 0 ? ((q.c - q.pc) / q.pc * 100) : null;
  const high52    = m['52WeekHigh'] || null;
  const low52     = m['52WeekLow']  || null;
  const pe        = m['peBasicExclExtraTTM'] || m['peNormalizedAnnual'] || null;
  const eps       = m['epsBasicExclExtraItemsTTM'] || null;
  const mktCap    = m['marketCapitalization'] ? fmtCap(m['marketCapitalization']) : null;
  const divYield  = m['dividendYieldIndicatedAnnual'] ? m['dividendYieldIndicatedAnnual'] / 100 : null;
  const profitMg  = m['netProfitMarginAnnual'] ? m['netProfitMarginAnnual'] / 100 : null;
  const revGrowth = m['revenueGrowthTTMYoy']   ? m['revenueGrowthTTMYoy']   / 100 : null;
  const epsGrowth = m['epsGrowthTTMYoy']        ? m['epsGrowthTTMYoy']        / 100 : null;
  const beta      = m['beta'] || null;
  const roe       = m['roeTTM'] ? m['roeTTM'] / 100 : null;
  const debtEq    = m['totalDebt/totalEquityAnnual'] || null;
  const fcfMg     = m['freeCashFlowMarginTTM'] ? m['freeCashFlowMarginTTM'] / 100 : null;

  let sparkline = null;
  if (cRes && cRes.s === 'ok' && cRes.c && cRes.c.length > 4) {
    sparkline = cRes.c.slice(-52);
  }

  return {
    price, change, high52, low52, pe, eps, mktCap,
    divYield, profitMg, revGrowth, epsGrowth, beta, roe,
    debtEq, fcfMg, sparkline,
    hasRealData: !!price
  };
}

async function claudeReason(prompt, attempt = 0) {
  const r = await fetch(AV_BASE, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': avKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 1024,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  // Retry on overload (529) or rate limit (429) — up to 3 attempts
  if ((r.status === 529 || r.status === 429) && attempt < 3) {
    const delay = [8000, 18000, 35000][attempt];
    toast(`API overloaded — retrying in ${delay/1000}s… (attempt ${attempt+1}/3)`, 'w');
    await new Promise(res => setTimeout(res, delay));
    return claudeReason(prompt, attempt + 1);
  }

  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    if (r.status === 401) throw new Error('Invalid Anthropic API key — check your sk-ant key');
    if (r.status === 529) throw new Error('API overloaded after 3 retries — try again in a few minutes');
    if (r.status === 429) throw new Error('Rate limited after 3 retries — wait a moment');
    throw new Error(e?.error?.message || `Anthropic HTTP ${r.status}`);
  }

  const data = await r.json();
  const text = data.content?.map(b => b.text || '').join('').trim();
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function fetchTarget(id) {
  const idx = watchlist.findIndex(c => c.id === id);
  if (idx < 0) return;
  const c = watchlist[idx];

  if (!fhKey && !avKey) {
    document.getElementById('apiBanner').classList.remove('hide');
    toast('Enter Finnhub + Anthropic API keys to fetch', 'err');
    return;
  }
  if (!avKey) { toast('Anthropic key required for AI analysis', 'err'); return; }

  watchlist[idx].loading = true;
  watchlist[idx].loadPhase = 'FETCHING MARKET DATA';
  watchlist[idx].error = null;
  saveList(); render();

  try {
    // Step 1 — Finnhub real data
    let mkt = { price:null, change:null, high52:null, low52:null, pe:null, eps:null,
                mktCap:null, divYield:null, profitMg:null, revGrowth:null, epsGrowth:null,
                beta:null, roe:null, debtEq:null, fcfMg:null, sparkline:null, hasRealData:false };

    if (fhKey) {
      try {
        mkt = await fetchMarketData(c.ticker, c.exch);
      } catch(e) {
        console.warn('Finnhub unavailable:', e.message);
        // Non-fatal — Claude will analyse with knowledge-cutoff data
      }
    }

    // Step 2 — Update loading phase
    watchlist[idx].loadPhase = 'AI ANALYSIS (1–10 YR)';
    render();

    // Step 3 — Claude reasoning
    const prompt = isETF(c.sector)
      ? etfPrompt(c.ticker, c.exch, c.name, c.sector, mkt)
      : stockPrompt(c.ticker, c.exch, c.name, c.sector, mkt);

    const ai = await claudeReason(prompt);
    const n  = v => (v === null || v === undefined || isNaN(Number(v))) ? null : Number(v);

    watchlist[idx] = {
      ...watchlist[idx],
      loading: false, error: null,
      signal:   ai.signal  || 'WATCH',
      score:    Math.min(100, Math.max(0, Math.round(n(ai.score) ?? 50))),
      fetched:  new Date().toISOString(),
      hasRealData: mkt.hasRealData,
      data: {
        price: mkt.price, change: mkt.change, high52: mkt.high52, low52: mkt.low52,
        pe: mkt.pe, eps: mkt.eps, mktCap: mkt.mktCap, divYield: mkt.divYield,
        profitMg: mkt.profitMg, revGrowth: mkt.revGrowth, epsGrowth: mkt.epsGrowth,
        beta: mkt.beta, roe: mkt.roe, debtEq: mkt.debtEq, fcfMg: mkt.fcfMg,
      },
      sparkline:      mkt.sparkline,
      moat:           ai.moat           || null,
      timeHorizon:    ai.timeHorizon    || null,
      thesis:         ai.thesis         || '',
      keyRisk:        ai.keyRisk        || '',
      expenseRatio:   n(ai.expenseRatio),
      indexQuality:   ai.indexQuality   || null,
      dcaSuitable:    ai.dcaSuitable    ?? null,
      cats:           (ai.cats   || []).slice(0, 3),
      risks:          (ai.risks  || []).slice(0, 3),
      currentGrowth:  ai.currentGrowth  || '',
      potentialGrowth:ai.potentialGrowth || '',
      expectedGrowth: ai.expectedGrowth  || ''
    };

    saveList(); render();
    toast(`${c.ticker} — ${ai.signal} · Score ${ai.score}`, 'ok');

  } catch(err) {
    console.error(err);
    watchlist[idx].loading = false;
    watchlist[idx].error   = err.message;
    saveList(); render();
    toast(`${c.ticker}: ${err.message}`, 'err');
  }
}

function initSearch() {
  const inp = document.getElementById('searchIn');
  const dd  = document.getElementById('dropdown');

  inp.addEventListener('input', () => {
    const q = inp.value.trim().toLowerCase();
    if (!q) { dd.classList.remove('open'); dropItems = []; dropIdx = -1; return; }

    const res = STOCKS.filter(s =>
      s.t.toLowerCase().startsWith(q) ||
      s.n.toLowerCase().includes(q) ||
      s.t.toLowerCase().includes(q)
    ).slice(0, 12);

    dropItems = res; dropIdx = -1;

    if (!res.length) {
      dd.innerHTML = `<div class="drop-empty">NO MATCHES FOUND</div>`;
    } else {
      const grps = {};
      res.forEach(r => { if (!grps[r.e]) grps[r.e] = []; grps[r.e].push(r); });
      let html = '';
      Object.keys(grps).forEach(ex => {
        html += `<div class="drop-group">${ex}</div>`;
        grps[ex].forEach(s => {
          const gi = res.indexOf(s);
          html += `<div class="drop-item" onclick="selectStock(${gi})">
            <span class="di-tick">${hl(s.t,q)}</span>
            <span class="di-name">${hl(s.n,q)}</span>
            <span class="di-exch">${s.e}</span>
            <span class="di-sect">${s.s}</span>
          </div>`;
        });
      });
      dd.innerHTML = html;
    }
    dd.classList.add('open');
  });

  inp.addEventListener('keydown', e => {
    if (!dd.classList.contains('open')) return;
    if      (e.key === 'ArrowDown')             { e.preventDefault(); dropIdx = Math.min(dropIdx+1, dropItems.length-1); hlDrop(); }
    else if (e.key === 'ArrowUp')               { e.preventDefault(); dropIdx = Math.max(dropIdx-1, 0); hlDrop(); }
    else if (e.key === 'Enter' && dropIdx >= 0) { e.preventDefault(); selectStock(dropIdx); }
    else if (e.key === 'Escape')                { dd.classList.remove('open'); }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#searchWrap')) dd.classList.remove('open');
  });
}

function hl(str, q) {
  const i = str.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return str;
  return `${str.slice(0,i)}<span style="color:var(--gold);font-weight:600">${str.slice(i,i+q.length)}</span>${str.slice(i+q.length)}`;
}

function hlDrop() {
  document.querySelectorAll('.drop-item').forEach((el,i) => el.classList.toggle('focused', i === dropIdx));
}

function selectStock(idx) {
  const s = dropItems[idx];
  if (!s) return;
  document.getElementById('dropdown').classList.remove('open');
  document.getElementById('searchIn').value = '';
  if (watchlist.find(c => c.ticker === s.t && c.exch === s.e)) {
    toast(`${s.t} already in watchlist`, 'w'); return;
  }
  watchlist.unshift({
    id: Date.now(), ticker: s.t, exch: s.e, name: s.n, sector: s.s,
    signal: 'PENDING', score: null, data: null, error: null, fetched: null
  });
  saveList(); render();
  toast(`${s.t} added — click FETCH for intelligence`, 'ok');
}

/* ══════════════════════════════════════════
   SPARKLINE
══════════════════════════════════════════ */
function buildSpark(prices, exchange) {
  if (!prices || prices.length < 4) return '';
  const W = 300, H = 52;
  const min  = Math.min(...prices), max = Math.max(...prices);
  const span = max - min || 1;
  const pts  = prices.map((p,i) => [
    Math.round(i / (prices.length-1) * W),
    Math.round(H - ((p-min)/span) * (H-6) - 3)
  ]);
  const first = prices[0], last = prices[prices.length-1];
  const isUp  = last >= first;
  const color = isUp ? '#1A6835' : '#B42E2E';
  const fill  = isUp ? 'rgba(26,104,53,.09)' : 'rgba(180,46,46,.09)';
  const pct   = ((last-first)/first*100).toFixed(1);
  const poly  = pts.map(p=>p.join(',')).join(' ');
  const area  = `M${pts[0].join(',')} ${pts.map(p=>'L'+p.join(',')).join(' ')} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const lp    = pts[pts.length-1];
  const c     = curr(exchange);

  return `<div class="spark-wrap">
    <div class="spark-hdr">
      <span>${prices.length}W TREND</span>
      <span style="color:${color};font-weight:600">${isUp?'+':''}${pct}%</span>
    </div>
    <svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${area}" fill="${fill}"/>
      <polyline points="${poly}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lp[0]}" cy="${lp[1]}" r="3" fill="${color}"/>
    </svg>
    <div class="spark-rng">
      <span>L ${c}${min.toFixed(2)}</span>
      <span>${prices.length}W</span>
      <span>H ${c}${max.toFixed(2)}</span>
    </div>
  </div>`;
}

function buildCard(c) {
  const d   = c.data || {};
  const sig = c.signal || 'PENDING';
  const sc  = c.score;
  const scC = sc === null ? 'na' : sc >= 65 ? 'h' : sc >= 42 ? 'm' : 'l';
  const cx  = curr(c.exch);

  // Stale banner
  const staleHtml = isStale(c.fetched)
    ? `<div class="cstale">⚠ DATA IS ${staleDays(c.fetched)} DAYS OLD — REFRESH RECOMMENDED</div>`
    : '';

  // Price section
  const priceHtml = d.price ? `
    <div class="cprice-row">
      <span class="cprice">${cx}${fmt(d.price)}</span>
      <span class="cchange ${d.change>0?'pos':d.change<0?'neg':'neu'}">${d.change>0?'+':''}${fmt(d.change,2)}%</span>
      ${d.high52?`<span class="c52w">52W ${cx}${fmt(d.low52)} – ${cx}${fmt(d.high52)}</span>`:''}
    </div>
    <div class="cdsrc">
      <span class="${c.hasRealData?'live':''}">
        ${c.hasRealData ? '● LIVE FINNHUB DATA' : '○ KNOWLEDGE-BASED'}
      </span>
    </div>` : '';

  // Sparkline
  const sparkHtml = c.sparkline ? buildSpark(c.sparkline, c.exch) : '';

  // Score ring
  const scoreHtml = sc !== null ? (() => {
    const clrs = { h:'#1A6835', m:'#C87D10', l:'#B42E2E', na:'#ccc' };
    const clr  = clrs[scC] || '#ccc';
    const R    = 27, CX = 34, CY = 34;
    const circ = 2 * Math.PI * R;
    const arc  = circ * (240/360);
    const fillA= arc * (sc/100);
    const verdict = scC==='h' ? 'Strong Opportunity' : scC==='m' ? 'Monitor Closely' : 'Elevated Risk';
    const desc    = scC==='h'
      ? 'Fundamentals support long-term compounding.'
      : scC==='m'
      ? 'Mixed signals — await stronger confirmation.'
      : 'Risk factors outweigh long-term growth indicators.';
    return `<div class="cscore">
      <div class="cscore-ring">
        <svg viewBox="0 0 68 68">
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#E5E2DB" stroke-width="5"
            stroke-dasharray="${arc} ${circ-arc}" stroke-linecap="round"/>
          <circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="${clr}" stroke-width="5"
            stroke-dasharray="${fillA} ${circ-fillA}" stroke-linecap="round"
            style="transition:stroke-dasharray .9s ease"/>
        </svg>
        <div class="cscore-ring-lbl">
          <span class="cscore-n ${scC}">${sc}</span>
          <span class="cscore-sub">/100</span>
        </div>
      </div>
      <div>
        <div class="cscore-lbl">LONG-TERM SCORE</div>
        <div class="cscore-verdict ${scC}">${verdict}</div>
        <div class="cscore-desc">${desc}</div>
      </div>
    </div>`;
  })() : '';

  // Badges
  let badges = '';
  if (c.moat) {
    const mc = c.moat === 'WIDE' ? 'wide' : c.moat === 'NARROW' ? 'narrow' : 'none';
    badges += `<span class="cbadge ${mc}">⬡ ${c.moat} MOAT</span>`;
  }
  if (c.timeHorizon) badges += `<span class="cbadge">⏱ ${c.timeHorizon}</span>`;
  if (c.dcaSuitable === true)  badges += `<span class="cbadge dca">↓ DCA SUITABLE</span>`;
  if (c.indexQuality) {
    const ic = c.indexQuality === 'HIGH' ? 'hi' : c.indexQuality === 'MEDIUM' ? 'med' : 'lo';
    badges += `<span class="cbadge ${ic}">◈ ${c.indexQuality} INDEX</span>`;
  }
  if (c.expenseRatio !== null && c.expenseRatio !== undefined) {
    badges += `<span class="cbadge">TER ${(c.expenseRatio*100).toFixed(2)}%</span>`;
  }
  const badgesHtml = badges ? `<div class="cbadges">${badges}</div>` : '';

  // Thesis
  const thesisHtml = c.thesis ? `<div class="cthesis">
    <div class="cthesis-lbl">Investment Thesis</div>
    <div class="cthesis-txt">${c.thesis}</div>
  </div>` : '';

  // Metrics
  let metricsHtml = '';
  if (d.price) {
    if (!isETF(c.sector)) {
      metricsHtml = `<div class="cmet"><div class="cmet-grid">
        <div><div class="cmet-l">P/E</div><div class="cmet-v">${fmt(d.pe,1)}</div></div>
        <div><div class="cmet-l">EPS</div><div class="cmet-v">${fmt(d.eps)}</div></div>
        <div><div class="cmet-l">MKT CAP</div><div class="cmet-v">${d.mktCap||'N/A'}</div></div>
        <div><div class="cmet-l">DIV YLD</div><div class="cmet-v ${d.divYield>0.03?'pos':''}">${fmtP(d.divYield)}</div></div>
        <div><div class="cmet-l">PRFT MG</div><div class="cmet-v ${d.profitMg>0?'pos':'neg'}">${fmtP(d.profitMg)}</div></div>
        <div><div class="cmet-l">REV GRW</div><div class="cmet-v ${d.revGrowth>0?'pos':'neg'}">${fmtP(d.revGrowth)}</div></div>
        <div><div class="cmet-l">ROE</div><div class="cmet-v ${d.roe>0.15?'pos':d.roe<0?'neg':''}">${fmtP(d.roe)}</div></div>
        <div><div class="cmet-l">BETA</div><div class="cmet-v ${d.beta>1.5?'warn':''}">${fmt(d.beta,2)}</div></div>
      </div></div>`;
    } else {
      metricsHtml = `<div class="cmet"><div class="cmet-grid">
        <div><div class="cmet-l">DIV YLD</div><div class="cmet-v ${d.divYield>0.02?'pos':''}">${fmtP(d.divYield)}</div></div>
        <div><div class="cmet-l">BETA</div><div class="cmet-v">${fmt(d.beta,2)}</div></div>
        <div><div class="cmet-l">52W HIGH</div><div class="cmet-v">${d.high52?cx+fmt(d.high52):'N/A'}</div></div>
        <div><div class="cmet-l">52W LOW</div><div class="cmet-v">${d.low52?cx+fmt(d.low52):'N/A'}</div></div>
      </div></div>`;
    }
  }

  // Growth
  const growthHtml = c.currentGrowth ? `<div class="cgrowth">
    <div class="cgrow-item"><span class="cgrow-tag">CURRENT</span><span class="cgrow-txt">${c.currentGrowth}</span></div>
    <div class="cgrow-item"><span class="cgrow-tag">POTENTIAL</span><span class="cgrow-txt">${c.potentialGrowth}</span></div>
    <div class="cgrow-item"><span class="cgrow-tag">EXPECTED</span><span class="cgrow-txt">${c.expectedGrowth}</span></div>
  </div>` : '';

  // Tags
  const tagsHtml = (c.cats?.length || c.risks?.length) ? `<div class="ctags">
    ${(c.cats||[]).map(t => `<span class="ctag cat">↑ ${t}</span>`).join('')}
    ${(c.risks||[]).map(t => `<span class="ctag risk">⚠ ${t}</span>`).join('')}
  </div>` : '';

  // Pending / Error
  const pendingHtml = !d.price && !c.loading && !c.error ? `<div class="cpending">
    <div class="cpending-ttl">Awaiting Intelligence</div>
    <div class="cpending-sub">Click FETCH · Finnhub live data → Claude AI analysis</div>
  </div>` : '';

  const errHtml = c.error ? `<div class="cerr">⚠ ${c.error}</div>` : '';

  // Footer
  const updTxt = c.fetched
    ? 'UPDATED ' + new Date(c.fetched).toLocaleDateString('en-ZA', {day:'2-digit',month:'short',year:'2-digit'}).toUpperCase()
    : 'NOT FETCHED';

  // Loading overlay
  const loadHtml = c.loading ? `<div class="cloading">
    <div class="cload-lbl">Loading ${c.ticker}</div>
    <div class="cload-bar"><div class="cload-fill"></div></div>
    <div class="cload-phase">${c.loadPhase || 'INITIALISING'}</div>
    <div class="cload-sub">FINNHUB → CLAUDE PIPELINE</div>
    <button class="cload-cancel" onclick="cancelFetch(${c.id})">✕ CANCEL</button>
  </div>` : '';

  return `<div class="card ${sig}" id="card-${c.id}">
  <div class="card-stripe"></div>
  <div class="chead">
    <div>
      <div class="cticker">${c.ticker}</div>
      <div class="cname">${c.name}</div>
      <div class="csector">${c.sector}</div>
    </div>
    <div class="chead-r">
      <div class="cexch">${c.exch}</div>
      <div class="csignal ${sig}">${sig}</div>
    </div>
  </div>
  ${staleHtml}${priceHtml}${sparkHtml}${scoreHtml}${badgesHtml}${thesisHtml}${metricsHtml}${growthHtml}${tagsHtml}${pendingHtml}${errHtml}
  <div class="cfoot">
    <span class="cupdated">${updTxt}</span>
    <div class="cbtns">
      <button class="cbtn cbtn-fetch" onclick="fetchTarget(${c.id})">${d.price?'↻ REFRESH':'⚡ FETCH'}</button>
      <button class="cbtn cbtn-del"   onclick="remove(${c.id})">✕ REMOVE</button>
    </div>
  </div>
  ${loadHtml}
</div>`;
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
function cancelFetch(id) {
  const i = watchlist.findIndex(c => c.id === id);
  if (i < 0) return;
  watchlist[i].loading = false; watchlist[i].error = null;
  saveList(); render(); toast('Fetch cancelled', 'ok');
}

function remove(id) {
  watchlist = watchlist.filter(c => c.id !== id);
  saveList(); render();
}

function saveList() {
  localStorage.setItem('sv4_list', JSON.stringify(watchlist));
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = `toast ${type}`; }, 3500);
}
</script>

</body>
</html>
